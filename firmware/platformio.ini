; PlatformIO — RetroWave
; Profilo predefinito: ESP32-WROOM-32U (Bluetooth Classic + A2DP + WiFi + antenna U.FL).
; Collegare l'antenna 2.4 GHz prima dell'uso (WiFi e BT condividono la radio).

[platformio]
default_envs = esp32-wroom-32u

[env]
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

; --- ESP32-S3 (solo BLE, nessun A2DP) — YD / DevKit con pin I2S 17/18/16 ---
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
build_flags = 
	-DCORE_DEBUG_LEVEL=3
lib_deps = 
	bblanchon/ArduinoJson@^7.2.1
	tzapu/WiFiManager@^2.0.17
	https://github.com/schreibfaul1/ESP32-audioI2S.git#2.0.6

; --- ESP32-WROOM-32U + antenna esterna: WiFi + BR/EDR + A2DP sink su I2S ---
; Pin I2S default (cablaggio attuale) verso GY-PCM5102:
; BCK=GPIO16, DIN=GPIO17, LRCK/LRC=GPIO5.
; Flash tipica 4 MB: huge_app lascia spazio a stack BT + app.
[env:esp32-wroom-32u]
platform = espressif32
board = esp32dev
board_build.partitions = huge_app.csv
build_flags = 
	-DCORE_DEBUG_LEVEL=3
	-DA2DP_LEGACY_I2S_SUPPORT=1
	-DA2DP_SPP_SUPPORT=0
	-DRETROWAVE_BOARD_WROOM32U=1
	-DI2S_BCLK=16
	-DI2S_LRC=5
	-DI2S_DOUT=17
lib_deps = 
	bblanchon/ArduinoJson@^7.2.1
	tzapu/WiFiManager@^2.0.17
	https://github.com/schreibfaul1/ESP32-audioI2S.git#2.0.6
	https://github.com/pschatzmann/ESP32-A2DP.git

; Alias retrocompatibile (stesso firmware della WROOM-32U).
[env:esp32-wroom-a2dp]
extends = env:esp32-wroom-32u

; --- Scheda CON PSRAM OPI (es. YD-ESP32-S3 N16R8): pio run -e esp32-s3-devkitc-1-opipsram ---
[env:esp32-s3-devkitc-1-opipsram]
extends = env:esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
build_flags = 
	${env:esp32-s3-devkitc-1.build_flags}
	-DBOARD_HAS_PSRAM
